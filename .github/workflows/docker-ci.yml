name: Deploy Application

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted # Dùng chính VPS của bạn làm runner
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Đảm bảo SQL Server và Redis luôn chạy (không build lại)
      - name: Start Database and Redis
        run: docker compose up -d sqlserver redis

      # 2. Build và khởi động lại Backend & Frontend
      # --no-deps giúp không đụng chạm đến sqlserver/redis
      # --build chỉ áp dụng cho backend và frontend
      - name: Deploy Backend and Frontend
        run: |
          docker compose up -d --build --no-deps backend frontend
          docker image prune -f # Dọn dẹp image cũ để tiết kiệm dung lượng