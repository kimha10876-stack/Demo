version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: tixclick-sqlserver
    restart: always
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Ryy15072003@"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    deploy:
      resources:
        limits:
          memory: 1536M

  redis:
    image: redis:alpine
    container_name: tixclick-redis
    restart: always
    command: redis-server --requirepass Ryy15072003@
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 128M

  backend:
    build:
      context: ./TixClick_BackEnd
      dockerfile: Dockerfile
    container_name: tixclick-backend
    restart: always
    environment:
      DB_HOST: sqlserver
      DB_NAME: tixclick
      DB_USER: sa
      DB_PASSWORD: "Ryy15072003@"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: "Ryy15072003@"
      JAVA_TOOL_OPTIONS: "-XX:+UseSerialGC -Xmx384m"
    ports:
      - "8080:8080"
    depends_on:
      - sqlserver
      - redis
    deploy:
      resources:
        limits:
          memory: 512M

  frontend:
    build:
      context: ./TixClick_FrontEnd
      dockerfile: dockerfile
    container_name: tixclick-frontend
    restart: always
    ports:
      - "80:80"
      - "5173:80"
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  mssql_data:
  redis_data:
